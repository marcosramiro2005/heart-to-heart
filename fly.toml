# Configuración de despliegue en Fly.io para Heart to Heart
# Documentación: https://fly.io/docs/reference/configuration/

app = "heart-to-heart-marcos"   # CAMBIA ESTO: debe ser único en Fly.io (ej: heart-to-heart-marco)
primary_region = "mad"        # Madrid — servidor más cercano a España

[build]

[env]
  APP_ENV    = "production"
  APP_DEBUG  = "false"
  APP_URL    = "https://heart-to-heart-marcos.fly.dev"
  LOG_LEVEL  = "error"
  DB_CONNECTION = "sqlite"
  DB_DATABASE   = "/var/www/html/database/database.sqlite"
  SESSION_DRIVER  = "database"
  CACHE_STORE     = "database"
  QUEUE_CONNECTION = "database"

[http_service]
  internal_port = 80
  force_https   = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1

# Volumen persistente para que la base de datos SQLite no se pierda
# al redesplegar la app
[[mounts]]
  source      = "heart_data"
  destination = "/var/www/html/database"
  initial_size = "1gb"
